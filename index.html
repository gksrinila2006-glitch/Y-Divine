<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift For You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            background: linear-gradient(135deg, #ffffff 0%, #faf8f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #4a4a4a;
        }

        /* Gift Box Styles */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gift-box {
            position: relative;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #c41e3a 0%, #a01830 100%);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 20px 60px rgba(196, 30, 58, 0.25);
            animation: floatBox 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .gift-box:hover {
            transform: scale(1.05);
            box-shadow: 0 25px 75px rgba(196, 30, 58, 0.35);
        }

        .gift-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.3), transparent);
            border-radius: 8px;
            animation: glow 2s ease-in-out infinite;
        }

        .gift-ribbon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 20px;
            background: #fff;
            animation: ribbonShine 2s ease-in-out infinite;
        }

        .gift-ribbon::before,
        .gift-ribbon::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 100%;
            background: #fff;
            top: 0;
        }

        .gift-ribbon::before {
            left: 50%;
            transform: translateX(-50%);
        }

        .gift-ribbon::after {
            left: 50%;
            transform: translateX(-50%) rotate(90deg);
        }

        .gift-bow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: #c41e3a;
            border-radius: 50%;
            box-shadow: 
                -20px 0 0 -10px #c41e3a,
                20px 0 0 -10px #c41e3a;
            animation: bowBounce 2s ease-in-out infinite;
        }

        /* Animations */
        @keyframes floatBox {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes glow {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
        }

        @keyframes ribbonShine {
            0%, 100% {
                background: #fff;
            }
            50% {
                background: #f0e6e6;
            }
        }

        @keyframes bowBounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0px);
            }
            50% {
                transform: translateX(-50%) translateY(-8px);
            }
        }

        @keyframes openBox {
            0% {
                transform: scale(1) rotateX(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(0.5) rotateX(-90deg);
                opacity: 0;
            }
        }

        .gift-box.opening {
            animation: openBox 0.8s ease-in-out forwards;
        }

        /* Choice Icons Container */
        .choices-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 80px;
            opacity: 0;
            pointer-events: none;
            animation: fadeInChoices 0.8s ease-out 0.8s forwards;
            z-index: 10;
        }

        @keyframes fadeInChoices {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .choice-icon {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 3px solid #c41e3a;
        }

        .choice-icon:hover {
            transform: scale(1.15);
            box-shadow: 0 15px 50px rgba(196, 30, 58, 0.3);
            animation: iconGlow 0.6s ease-in-out infinite;
        }

        @keyframes iconGlow {
            0%, 100% {
                box-shadow: 0 15px 50px rgba(196, 30, 58, 0.3);
            }
            50% {
                box-shadow: 0 15px 60px rgba(196, 30, 58, 0.5);
            }
        }

        /* Message Pop-up */
        .message-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            animation: fadeInPopup 0.8s ease-out forwards;
            backdrop-filter: blur(5px);
        }

        @keyframes fadeInPopup {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .popup-content {
            text-align: center;
            max-width: 90%;
            animation: contentSlideIn 1s ease-out;
        }

        @keyframes contentSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-popup.moon .popup-content {
            animation: contentSlideIn 1.2s ease-out;
        }

        .popup-title {
            font-size: 3rem;
            margin-bottom: 30px;
            color: #c41e3a;
            font-weight: normal;
            letter-spacing: 2px;
        }

        .popup-message {
            font-size: 1.8rem;
            line-height: 1.8;
            color: #4a4a4a;
            margin-bottom: 40px;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .popup-quote {
            font-size: 1.5rem;
            color: #c41e3a;
            font-style: italic;
            line-height: 1.8;
            margin: 30px 0;
            opacity: 0;
            animation: quoteAppear 1.5s ease-out 0.5s forwards;
        }

        @keyframes quoteAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sun-message {
            font-size: 2.5rem;
            color: #c41e3a;
            font-weight: bold;
            animation: shakeMessage 0.5s ease-in-out;
        }

        @keyframes shakeMessage {
            0%, 100% {
                transform: translateX(0);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-10px);
            }
            20%, 40%, 60%, 80% {
                transform: translateX(10px);
            }
        }

        .close-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: white;
            border: 2px solid #c41e3a;
            border-radius: 50%;
            font-size: 24px;
            color: #c41e3a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 25;
            opacity: 0;
            animation: fadeInBtn 0.6s ease-out 0.8s forwards;
        }

        @keyframes fadeInBtn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .close-btn:hover {
            background: #c41e3a;
            color: white;
            transform: rotate(90deg);
        }

        /* Particle Effects */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        .particle {
            position: absolute;
            font-size: 30px;
            opacity: 0;
            animation: particleFloat 4s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .gift-box {
                width: 100px;
                height: 100px;
            }

            .choice-icon {
                width: 80px;
                height: 80px;
                font-size: 48px;
            }

            .choices-container {
                gap: 50px;
            }

            .popup-title {
                font-size: 2rem;
            }

            .popup-message {
                font-size: 1.3rem;
            }

            .popup-quote {
                font-size: 1.2rem;
            }

            .sun-message {
                font-size: 1.8rem;
            }

            .close-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
                top: 20px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            .gift-box {
                width: 90px;
                height: 90px;
            }

            .choice-icon {
                width: 70px;
                height: 70px;
                font-size: 40px;
                border-width: 2px;
            }

            .choices-container {
                gap: 40px;
            }

            .popup-title {
                font-size: 1.8rem;
                margin-bottom: 20px;
            }

            .popup-message {
                font-size: 1.1rem;
                margin-bottom: 20px;
            }

            .popup-quote {
                font-size: 1rem;
            }

            .sun-message {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="gift-box" id="giftBox">
            <div class="gift-bow"></div>
            <div class="gift-ribbon"></div>
        </div>
        
        <div class="choices-container" id="choicesContainer">
            <div class="choice-icon" id="moonIcon">🌙</div>
            <div class="choice-icon" id="sunIcon">☀️</div>
        </div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="message-popup moon" id="moonPopup">
        <div class="close-btn" id="closeBtn">✕</div>
        <div class="popup-content">
            <div class="popup-title">I'm Sorry</div>
            <div class="popup-message">
                From the depths of my heart, I apologize for my mistakes. You mean everything to me.
            </div>
            <div class="popup-quote">
                "Love isn't about finding someone perfect… it's about seeing someone imperfect, perfectly."
            </div>
        </div>
    </div>

    <div class="message-popup sun" id="sunPopup">
        <div class="close-btn" id="closeBtnSun">✕</div>
        <div class="popup-content">
            <div class="sun-message">I hate you — you did not choose me. 😢</div>
        </div>
    </div>

    <script>
        const giftBox = document.getElementById('giftBox');
        const choicesContainer = document.getElementById('choicesContainer');
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');
        const moonPopup = document.getElementById('moonPopup');
        const sunPopup = document.getElementById('sunPopup');
        const closeBtn = document.getElementById('closeBtn');
        const closeBtnSun = document.getElementById('closeBtnSun');
        const particlesContainer = document.getElementById('particles');

        let boxOpened = false;

        // Gift box click handler
        giftBox.addEventListener('click', () => {
            if (!boxOpened) {
                boxOpened = true;
                giftBox.classList.add('opening');
                setTimeout(() => {
                    choicesContainer.style.pointerEvents = 'auto';
                }, 800);
            }
        });

        // Moon icon click handler
        moonIcon.addEventListener('click', () => {
            choicesContainer.style.opacity = '0';
            choicesContainer.style.pointerEvents = 'none';
            setTimeout(() => {
                moonPopup.style.opacity = '1';
                moonPopup.style.pointerEvents = 'auto';
                createParticles('heart');
            }, 300);
        });

        // Sun icon click handler
        sunIcon.addEventListener('click', () => {
            choicesContainer.style.opacity = '0';
            choicesContainer.style.pointerEvents = 'none';
            setTimeout(() => {
                sunPopup.style.opacity = '1';
                sunPopup.style.pointerEvents = 'auto';
            }, 300);
        });

        // Close button handlers
        closeBtn.addEventListener('click', resetExperience);
        closeBtnSun.addEventListener('click', resetExperience);

        // Reset experience
        function resetExperience() {
            moonPopup.style.opacity = '0';
            moonPopup.style.pointerEvents = 'none';
            moonPopup.style.animation = 'none';
            sunPopup.style.opacity = '0';
            sunPopup.style.pointerEvents = 'none';
            sunPopup.style.animation = 'none';
            
            // Clear particles
            particlesContainer.innerHTML = '';

            setTimeout(() => {
                boxOpened = false;
                giftBox.classList.remove('opening');
                giftBox.style.animation = 'floatBox 3s ease-in-out infinite';
                choicesContainer.style.opacity = '0';
                choicesContainer.style.pointerEvents = 'none';
            }, 300);
        }

        // Create particle effects
        function createParticles(type) {
            const particleCount = 20;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.textContent = type === 'heart' ? '❤' : '✨';
                
                const tx = (Math.random() - 0.5) * 500;
                const ty = (Math.random() - 0.5) * 500 - 200;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.left = (Math.random() * 100) + '%';
                particle.style.top = (Math.random() * 100) + '%';
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 4000);
            }
        }

        // Initialize - ensure choices are hidden
        choicesContainer.style.opacity = '0';
        choicesContainer.style.pointerEvents = 'none';
        choicesContainer.style.display = 'flex';
        
        moonPopup.style.opacity = '0';
        moonPopup.style.pointerEvents = 'none';
        moonPopup.style.display = 'flex';
        
        sunPopup.style.opacity = '0';
        sunPopup.style.pointerEvents = 'none';
        sunPopup.style.display = 'flex';
    </script>
</body>
</html>
